name: Issue to Blog Post (Draft/Publish)

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write  # ← 追加

jobs:
  build:
    runs-on: ubuntu-latest

    if: >
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR') &&
      contains(github.event.issue.labels.*.name, 'publish') &&
      !contains(github.event.issue.labels.*.name, 'draft')

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create Post
        run: |
          TITLE="${{ github.event.issue.title }}"
          BODY="${{ github.event.issue.body }}"
          NUMBER="${{ github.event.issue.number }}"
          # tags取得（簡易パース）
          RAW_TAGS=$(echo "${{ github.event.issue.body }}" | sed -n 's/.*タグ.*"\(.*\)".*/\1/p')

          # クォート削除（念のため）
          RAW_TAGS=$(echo "$RAW_TAGS" | tr -d '"')

          # カンマ → YAML配列形式
          TAGS=$(echo "$RAW_TAGS" | sed 's/,/, /g')

          # tags行生成（空なら出さない）
          if [ -n "$TAGS" ]; then
          TAG_LINE="tags: [$TAGS]"
          else
          TAG_LINE=""
          fi

          export TZ=Asia/Tokyo

          DATE=$(date +'%Y-%m-%d')
          TIME=$(date +'%H%M%S')

          FILE="_posts/${DATE}-${TIME}.md"

          echo "Creating $FILE"

          # 🛑 二重投稿防止
          if grep -rl "source_issue: ${NUMBER}" _posts/ 2>/dev/null; then
            echo "Post already exists. Skipping."
            exit 0
          fi

          {
            echo "---"
            echo "title: \"${TITLE//\"/\\\"}\""
            echo "date: ${DATE} ${TIME:0:2}:${TIME:2:2}:${TIME:4:2} +0900"
            echo "source_issue: ${NUMBER}"
            echo "layout: post"
            echo "$TAG_LINE"
            echo "---"
            echo ""
            echo "$BODY"
          } > "$FILE"

      - name: Remove draft label
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: draft

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Publish post from issue #${{ github.event.issue.number }}" || echo "No changes"
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
      - name: Generate tag pages
        run: |
          mkdir -p _tags

          # 既存タグ削除（再生成）
          rm -f _tags/*.md

          # 全記事からtags抽出
          TAGS=$(grep -rhoP '^tags: \[.*\]' _posts/ \
            | sed 's/tags: \[//' \
            | sed 's/\]//' \
            | tr ',' '\n' \
            | sed 's/^ *//' \
            | sed 's/ *$//' \
            | tr -d '"' \
            | sort -u)

          for tag in $TAGS; do
            cat <<EOF > "_tags/$tag.md"
---
layout: tag
name: $tag
---
EOF
    done