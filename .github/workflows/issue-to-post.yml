name: Issue to Blog Post (Draft/Publish)

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    if: >
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR') &&
      contains(github.event.issue.labels.*.name, 'publish') &&
      !contains(github.event.issue.labels.*.name, 'draft')

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # =========================
      # 📝 記事生成
      # =========================
      - name: Create Post
        run: |
          BODY="${{ github.event.issue.body }}"
          NUMBER="${{ github.event.issue.number }}"

          # =========================
          # タイトル抽出
          # =========================
          TITLE=$(echo "$BODY" | sed -n '/^タイトル$/ {n;p;}' | head -n 1 | tr -d '\r')

          # =========================
          # 本文抽出
          # =========================
          CONTENT=$(echo "$BODY" | sed -n '/^本文$/,$p' | sed '1d')

          # =========================
          # タグ抽出
          # =========================
          RAW_TAGS=$(echo "$BODY" | sed -n '/^タグ/ {n;p;}' | head -n 1)
          RAW_TAGS=$(echo "$RAW_TAGS" | tr -d '"')
          TAGS=$(echo "$RAW_TAGS" | sed 's/,/, /g')

          if [ -n "$TAGS" ]; then
            TAG_LINE="tags: [$TAGS]"
          else
            TAG_LINE=""
          fi

          export TZ=Asia/Tokyo
          DATE=$(date +'%Y-%m-%d')
          TIME=$(date +'%H%M%S')

          FILE="_posts/${DATE}-${TIME}.md"

          echo "Creating $FILE"

          mkdir -p _posts

          {
            echo "---"
            echo "title: \"${TITLE//\"/\\\"}\""
            echo "date: ${DATE} ${TIME:0:2}:${TIME:2:2}:${TIME:4:2} +0900"
            echo "source_issue: ${NUMBER}"
            echo "layout: post"
            echo "$TAG_LINE"
            echo "---"
            echo ""
            printf "%s\n" "$CONTENT"
          } > "$FILE"

      # =========================
      # 🏷️ タグページ生成（完全版）
      # =========================
      - name: Generate tag pages
        run: |
          mkdir -p _tags
          rm -f _tags/*.md

          TAGS=$(grep -rhoP '^tags: \[.*\]' _posts/ \
            | sed 's/tags: \[//' \
            | sed 's/\]//' \
            | tr ',' '\n' \
            | sed 's/^ *//' \
            | sed 's/ *$//' \
            | tr -d '"' \
            | sort -u)

          echo "$TAGS" | while read tag; do
            [ -z "$tag" ] && continue

            printf -- "---\nlayout: tag\nname: %s\n---\n" "$tag" > "_tags/$tag.md"
          done

      # =========================
      # 🧹 draft削除
      # =========================
      - name: Remove draft label
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: draft

      # =========================
      # 💾 保存
      # =========================
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Publish post from issue #${{ github.event.issue.number }}" || echo "No changes"
          git push

      # =========================
      # 🔒 Issue閉じる
      # =========================
      - name: Close Issue
        uses: peter-evans/close-issue@v3