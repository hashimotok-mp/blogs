---
layout: default
---

<h1>タグ: {{ page.name }}</h1>

<ul>
  {% for post in site.posts %}
    {% if post.tags contains page.name %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <small>{{ post.date | date: "%Y-%m-%d" }}</small>
      </li>
    {% endif %}
  {% endfor %}
</ul>
